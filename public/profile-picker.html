<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Swipe - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #f5f3f0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        -webkit-font-smoothing: antialiased;
      }
      .picker-container {
        background: #ffffff;
        border-radius: 8px;
        padding: 48px 40px;
        max-width: 380px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(14, 12, 10, 0.08);
        text-align: center;
        border: 1px solid #e4e0db;
      }
      /* single red accent line at top — the only decoration */
      .picker-container::before {
        content: "";
        display: block;
        width: 28px;
        height: 3px;
        background: #c0413a;
        margin: 0 auto 28px;
        border-radius: 2px;
      }
      .picker-container h1 {
        font-family: "Syne", sans-serif;
        font-size: 26px;
        font-weight: 800;
        color: #141210;
        margin-bottom: 6px;
        letter-spacing: -0.03em;
      }
      .picker-container > p {
        color: #bcb8b2;
        margin-bottom: 28px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 500;
      }
      .username-input {
        width: 100%;
        padding: 13px 14px;
        border: 1px solid #e4e0db;
        border-radius: 4px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        margin-bottom: 10px;
        background: #f5f3f0;
        color: #141210;
        outline: none;
        transition:
          border-color 0.18s ease,
          box-shadow 0.18s ease;
      }
      .username-input:focus {
        border-color: #c0413a;
        background: #ffffff;
        box-shadow: 0 0 0 2px rgba(192, 65, 58, 0.1);
      }
      .username-input::placeholder {
        color: #bcb8b2;
      }
      .continue-btn {
        width: 100%;
        padding: 13px 14px;
        background: #c0413a;
        color: #ffffff;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.18s ease,
          box-shadow 0.18s ease;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 4px;
      }
      .continue-btn:hover {
        background: #9a3130;
        box-shadow: 0 4px 14px rgba(192, 65, 58, 0.22);
      }
      .continue-btn:disabled {
        background: #e4e0db;
        color: #bcb8b2;
        cursor: not-allowed;
        box-shadow: none;
      }
      .error {
        color: #c0413a;
        margin-top: 10px;
        font-size: 12px;
        min-height: 18px;
      }
      .accounts-info {
        margin-top: 24px;
        font-size: 11px;
        color: #bcb8b2;
        border-top: 1px solid #e4e0db;
        padding-top: 18px;
      }
      .accounts-info p:first-child {
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
        font-size: 10px;
        color: #888880;
      }
      .accounts-code {
        font-family: "Inter", sans-serif;
        font-size: 11px;
        line-height: 1.9;
        color: #bcb8b2;
      }
    </style>
  </head>
  <body>
    <div class="picker-container">
      <h1>Recipe Swipe</h1>
      <p>Login to your account</p>
      <input
        type="text"
        class="username-input"
        id="username"
        placeholder="Username"
        maxlength="30"
        autofocus
      />
      <input
        type="password"
        class="username-input"
        id="password"
        placeholder="Password"
        style="margin-top: 10px"
      />
      <button class="continue-btn" id="loginBtn">Login</button>
      <div class="error" id="error"></div>
      <div class="accounts-info">
        <p>Available accounts</p>
        <p class="accounts-code">
          yuan / recipe123 &nbsp;·&nbsp; oscar / cooking456<br />
          annie / food789 &nbsp;·&nbsp; bram / chef321<br />
          merrick / tasty654
        </p>
      </div>
    </div>

    <script>
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const errorEl = document.getElementById("error");

      function showError(msg) {
        errorEl.textContent = msg;
      }

      function hideError() {
        errorEl.textContent = "";
      }

      async function login(username, password) {
        try {
          const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
          });
          if (!res.ok) {
            const err = await res.json();
            showError(err.error || "Something went wrong");
            return false;
          }
          const data = await res.json();
          console.log("Login successful:", data);

          setTimeout(() => {
            window.location.href = "/";
          }, 500);

          return true;
        } catch (e) {
          showError("Network error");
          return false;
        }
      }

      loginBtn.addEventListener("click", async () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        if (!username || !password) {
          showError("Please enter username and password");
          return;
        }
        hideError();
        loginBtn.disabled = true;
        await login(username, password);
        loginBtn.disabled = false;
      });

      usernameInput.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          passwordInput.focus();
        }
      });

      passwordInput.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          loginBtn.click();
        }
      });

      usernameInput.addEventListener("input", () => {
        hideError();
      });

      passwordInput.addEventListener("input", () => {
        hideError();
      });

      usernameInput.focus();
    </script>
  </body>
</html>
